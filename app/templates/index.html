<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="background-decor"></div>

    <div class="container">
        <header>
            <h1>IPL Predictor</h1>
            <p>Predict match winners or track season accuracy.</p>
        </header>

        <main>

            <!-- ── Tabs ────────────────────────────────────── -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="predictor">🏏 Match Predictor</button>
                <button class="tab-btn"        data-tab="season">   📊 Season Tracker</button>
            </div>

            <!-- ══════════════════════════════════════════════
                 PANEL 1 — PREDICTOR
            ══════════════════════════════════════════════ -->
            <div class="panel active" id="panel-predictor">
                <form id="prediction-form">

                    <div class="form-group row">
                        <div class="col">
                            <label for="team1">Team 1</label>
                            <select id="team1" name="team1" required>
                                <option value="" disabled selected>Select Team 1</option>
                                {% for team in teams %}
                                <option value="{{ team }}">{{ team }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="vs-badge">VS</div>

                        <div class="col">
                            <label for="team2">Team 2</label>
                            <select id="team2" name="team2" required>
                                <option value="" disabled selected>Select Team 2</option>
                                {% for team in teams %}
                                <option value="{{ team }}">{{ team }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="venue">Match Venue</label>
                        <select id="venue" name="venue" required>
                            <option value="" disabled selected>Select Playing Venue</option>
                            {% for venue in venues %}
                            <option value="{{ venue }}">{{ venue }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group row">
                        <div class="col">
                            <label for="toss_winner">Toss Winner</label>
                            <select id="toss_winner" name="toss_winner" required>
                                <option value="" disabled selected>Who won the toss?</option>
                            </select>
                        </div>

                        <div class="col">
                            <label>Toss Decision</label>
                            <div class="toggle-group">
                                <input type="radio" id="bat" name="toss_decision" value="bat" checked>
                                <label for="bat">Bat First</label>
                                <input type="radio" id="field" name="toss_decision" value="field">
                                <label for="field">Field First</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="predict-btn">Predict Match Winner</button>
                </form>

                <div id="result-container" class="hidden">
                    <p class="result-label">Predicted Winner</p>
                    <h2 id="winner-name">Unknown</h2>

                    <div class="probability-box">
                        <div class="team-prob">
                            <span id="team1-name"></span>
                            <span id="team1-prob"></span>
                        </div>
                        <div class="progress-bar">
                            <div id="prob-bar-fill"></div>
                        </div>
                        <div class="team-prob">
                            <span id="team2-name"></span>
                            <span id="team2-prob"></span>
                        </div>
                    </div>

                    <p id="confidence-text"></p>
                </div>
            </div>

            <!-- ══════════════════════════════════════════════
                 PANEL 2 — SEASON TRACKER
            ══════════════════════════════════════════════ -->
            <div class="panel" id="panel-season">

                <div class="stats-grid">
                    <div class="stat-card acc-blue">
                        <div class="stat-value" id="stat-total">—</div>
                        <div class="stat-label">Matches</div>
                    </div>
                    <div class="stat-card acc-green">
                        <div class="stat-value" id="stat-correct">—</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat-card acc-red">
                        <div class="stat-value" id="stat-wrong">—</div>
                        <div class="stat-label">Incorrect</div>
                    </div>
                    <div class="stat-card acc-blue">
                        <div class="stat-value" id="stat-accuracy">—</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                </div>

                <div class="accuracy-bar-wrapper">
                    <div class="accuracy-bar-header">
                        <span>Season Accuracy</span>
                        <strong id="bar-accuracy-label">—</strong>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill" id="accuracy-bar"></div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <div class="table-toolbar">
                        <h2>Match Results</h2>
                        <div class="filter-tabs">
                            <button class="filter-tab active" data-filter="all">All</button>
                            <button class="filter-tab" data-filter="correct">✓ Correct</button>
                            <button class="filter-tab" data-filter="wrong">✗ Wrong</button>
                        </div>
                    </div>

                    <div class="table-scroll">
                        <div id="table-body-wrapper">
                            <div class="loader">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="last-updated" id="last-updated"></p>
            </div>

        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
