name: Evaluate IPL Season

# Run daily at 4:00 AM UTC, and allow manual trigger
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  evaluate-season:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run your script and log output to a single file
    - name: Run evaluate_season.py
      run: |
        mkdir -p data
        python evaluate_season.py > data/evaluate.log 2>&1

    # Step 5: Upload the single log file as an artifact
    - name: Upload log
      uses: actions/upload-artifact@v4
      with:
        name: evaluate-log
        path: data/evaluate.log
