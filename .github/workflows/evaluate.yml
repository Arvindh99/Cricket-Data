# evaluate.yml
on:
  schedule:
    - cron: '0 3 * * *'
  push:
    paths:
      - 'data/csv/ipl_current_season.csv'  # also triggers on CSV update

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: pip install -r requirements.txt
      - run: python evaluate_season.py
      - run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions"
          git add models/stats/season_eval.json
          git commit -m "Update season eval results" && git push || echo "No changes"
