name: Create CSV from JSON

on:
  workflow_run:
    workflows: ["Update CricSheet Data"] 
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Run CSV script
        run: python scripts/create_csv.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/csv/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update CSV dataset"
          git push
